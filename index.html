<!DOCTYPE html>
<html>
<head>
  <title>DealStrike</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="font-family: Arial; padding: 20px;">

<h2>DealStrike</h2>

<h3>Auto Deal Feed</h3>
<div id="autoDeals"></div>

<hr>

<h3>Your Pipeline</h3>
<div id="dealsList"></div>

<script>
let deals = [];

// LOAD AUTO DEALS
async function loadAutoDeals() {
    try {
        let res = await fetch("deals.json");
        let data = await res.json();

        let html = "";

        data.forEach(d => {
            let analyzed = analyzeDeal(d.address, d.arv, d.rehab, d.price);

            html += `
            <div style="border:1px solid #aaa; padding:10px; margin:10px;">
                <b>${d.address}</b><br>
                ARV: $${d.arv}<br>
                Price: $${d.price}<br>
                Rehab: $${d.rehab}<br>
                Profit: $${analyzed.profit}<br>
                <b>${analyzed.rating}</b><br><br>

                <button onclick='addToPipeline(${JSON.stringify(analyzed)})'>
                ➕ Add to Pipeline
                </button>
            </div>
            `;
        });

        document.getElementById("autoDeals").innerHTML = html;

    } catch (e) {
        document.getElementById("autoDeals").innerHTML = "No auto deals yet";
    }
}

// ANALYSIS ENGINE
function analyzeDeal(address, arv, rehab, price) {
    let mao = (arv * 0.7) - rehab;
    let profit = arv - price - rehab - 15000;
    let percent = (price / arv) * 100;

    let score = 0;

    if (percent <= 50) score += 50;
    else if (percent <= 60) score += 40;
    else if (percent <= 70) score += 30;

    if (profit > 50000) score += 30;
    else if (profit > 30000) score += 20;

    let rating = "PASS";
    if (score >= 80) rating = "ELITE DEAL";
    else if (score >= 60) rating = "STRONG DEAL";

    return { address, arv, rehab, price, profit, score, rating, status: "NEW" };
}

// ADD TO PIPELINE
function addToPipeline(deal) {
    deals.push(deal);
    localStorage.setItem("deals", JSON.stringify(deals));
    renderDeals();
}

// LOAD PIPELINE
let saved = localStorage.getItem("deals");
if (saved) {
    deals = JSON.parse(saved);
}

// RENDER PIPELINE
function renderDeals() {
    let html = "";

    deals.forEach(d => {
        html += `
        <div style="border:1px solid #ccc; padding:10px; margin:10px;">
            <b>${d.address}</b><br>
            ${d.rating} | Profit: $${d.profit}<br>
            Status: ${d.status}
        </div>
        `;
    });

    document.getElementById("dealsList").innerHTML = html;
}

// INIT
loadAutoDeals();
renderDeals();
</script>

</body>
</html>
