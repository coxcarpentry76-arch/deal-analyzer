<!DOCTYPE html>
<html>
<head>
  <title>Deal Analyzer</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="font-family: Arial; padding: 20px;">

<h2>Deal Analyzer</h2>

<label>Address:</label><br>
<input id="address" type="text"><br><br>

<label>ARV:</label><br>
<input id="arv" type="number"><br><br>

<label>Rehab:</label><br>
<input id="rehab" type="number"><br><br>

<label>Purchase Price:</label><br>
<input id="price" type="number"><br><br>

<label>Notes:</label><br>
<textarea id="notes" rows="3"></textarea><br><br>

<label>Estimated Rent:</label><br>
<input id="rent" type="number" value="1500"><br><br>

<label>Interest Rate (%):</label><br>
<input id="rate" type="number" value="7"><br><br>

<button onclick="analyze()">Analyze Deal</button>
<button onclick="saveDeal()">Save Deal</button>
<button onclick="clearDeals()">Clear Deals</button>

<h3 id="result"></h3>

<h3>Saved Deals</h3>
<div id="dealsList"></div>

<script>
let deals = [];

// LOAD SAVED DEALS
let saved = localStorage.getItem("deals");
if (saved) {
    deals = JSON.parse(saved);
    renderDeals();
}

// ANALYZE DEAL
function analyze() {
    let address = document.getElementById("address").value || "No address";
    let arv = parseFloat(document.getElementById("arv").value) || 0;
    let rehab = parseFloat(document.getElementById("rehab").value) || 0;
    let price = parseFloat(document.getElementById("price").value) || 0;
    let notes = document.getElementById("notes").value || "";
    let rent = parseFloat(document.getElementById("rent").value) || 0;
    let rate = (parseFloat(document.getElementById("rate").value) || 7) / 100;

    let mao = (arv * 0.7) - rehab;
    let profit = arv - price - rehab - 15000;
    let percentOfArv = arv ? (price / arv) * 100 : 0;

    // SCORING
    let score = 0;

    if (percentOfArv <= 50) score += 50;
    else if (percentOfArv <= 60) score += 40;
    else if (percentOfArv <= 70) score += 30;
    else if (percentOfArv <= 80) score += 10;

    if (profit > 50000) score += 30;
    else if (profit > 30000) score += 20;
    else if (profit > 15000) score += 10;

    let margin = mao - price;
    if (margin > 20000) score += 20;
    else if (margin > 10000) score += 10;

    let rating = "PASS";
    if (score >= 80) rating = "ELITE DEAL";
    else if (score >= 60) rating = "STRONG DEAL";
    else if (score >= 40) rating = "AVERAGE";

    // BRRRR CALCULATIONS
    let refiValue = arv * 0.75;
    let loanAmount = refiValue;

    let monthlyRate = rate / 12;
    let numPayments = 360;

    let payment = loanAmount > 0
        ? loanAmount * (monthlyRate * Math.pow(1 + monthlyRate, numPayments)) /
          (Math.pow(1 + monthlyRate, numPayments) - 1)
        : 0;

    let cashFlow = rent - payment;
    let cashLeft = (price + rehab) - loanAmount;

    let output = `
    MAO: $${mao.toFixed(0)}<br>
    Profit: $${profit.toFixed(0)}<br>
    % of ARV: ${percentOfArv.toFixed(1)}%<br>
    Score: ${score}/100<br><br>
    <b>${rating}</b>

    <br><br><b>--- BRRRR ---</b><br>
    Refi Value: $${refiValue.toFixed(0)}<br>
    Payment: $${payment.toFixed(0)}<br>
    Cash Flow: $${cashFlow.toFixed(0)}<br>
    Cash Left: $${cashLeft.toFixed(0)}
    `;

    document.getElementById("result").innerHTML = output;

    // SAVE TEMP DEAL
    window.lastDeal = {
        address, notes, arv, rehab, price, rent, rate,
        mao, profit, percentOfArv, score, rating,
        refiValue, payment, cashFlow, cashLeft
    };
}

// SAVE DEAL
function saveDeal() {
    if (!window.lastDeal) {
        alert("Analyze a deal first");
        return;
    }

    deals.push(window.lastDeal);
    deals.sort((a, b) => b.score - a.score);

    localStorage.setItem("deals", JSON.stringify(deals));
    renderDeals();
}

// CLEAR DEALS
function clearDeals() {
    localStorage.removeItem("deals");
    deals = [];
    renderDeals();
}

// RENDER DEALS
function renderDeals() {
    let html = "";

    deals.forEach((d, index) => {
        html += `
        <div style="border:1px solid #ccc; padding:10px; margin-bottom:10px;">
            <b>#${index + 1} - ${d.rating}</b><br>
            ${d.address}<br>
            <i>${d.notes || ""}</i><br>
            Score: ${d.score}<br>
            Price: $${d.price}<br>
            ARV: $${d.arv}<br>
            Profit: $${d.profit.toFixed(0)}<br>
            Cash Flow: $${d.cashFlow.toFixed(0)}<br>
            Cash Left: $${d.cashLeft.toFixed(0)}
        </div>
        `;
    });

    document.getElementById("dealsList").innerHTML = html;
}
</script>

</body>
</html>
